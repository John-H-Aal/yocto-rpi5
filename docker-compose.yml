services:
  yocto-builder:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    volumes:
      # Docker sstate — separate from native sstate-cache/ (different host tools =
      # different hashes). Host bind-mount so yocto user (uid 1000) owns it from
      # the start; named volumes are created root-owned and block writes.
      - ./sstate-cache-docker:/home/yocto/sstate-cache

      # ── Host-layer bind mounts (read-only) ─────────────────────────────────
      # Clone these on the host before first run — see SETUP.md § Layer Setup.
      - ./poky:/home/yocto/poky:ro
      - ./meta-openembedded:/home/yocto/meta-openembedded:ro
      # moto-timo/meta-lts-mixins (branch scarthgap/u-boot) — provides the U-Boot
      # version override required for RPi5 Scarthgap; must come before meta-raspberrypi
      - ./meta-lts-mixins:/home/yocto/meta-lts-mixins:ro
      # moto-timo fork of meta-raspberrypi (branch scarthgap)
      - ./meta-raspberrypi:/home/yocto/meta-raspberrypi:ro
      # official RAUC layer
      - ./meta-rauc:/home/yocto/meta-rauc:ro
      # moto-timo fork of meta-rauc-community (branch scarthgap/raspberrypi5_u-boot)
      - ./meta-rauc-community:/home/yocto/meta-rauc-community:ro

      # ── Live-edit + output ──────────────────────────────────────────────────
      - ./meta-john:/home/yocto/meta-john
      # Mount the whole build dir — oe-init-build-env needs to write to the
      # parent, not just conf/. tmp/ and cache/ are gitignored on the host.
      # bblayers.conf must use /home/yocto/… paths — see bblayers-docker.conf.example
      - ./build-rpi5:/home/yocto/build-rpi5
      # Reuse host downloads cache (safe to share between native and Docker)
      - ./downloads:/home/yocto/downloads
      # Built images land here
      - ./output:/home/yocto/output
      # RAUC signing keys — generate once on host, then this mount makes them
      # available inside Docker at the path the bundle recipe expects.
      - ./meta-john/files/rauc-keys:/home/yocto/rauc-keys:ro

    # Disable SELinux label enforcement for this container so bind-mounted
    # host files (user_home_t context) are accessible. Safe for a local dev
    # build environment; avoids mass-relabeling thousands of layer files.
    security_opt:
      - label=disable

    stdin_open: true
    tty: true

volumes:
  yocto-sstate:
